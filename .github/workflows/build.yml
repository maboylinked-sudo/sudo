name: Prepare Injection Binary
on: [push, workflow_dispatch]

jobs:
  prepare:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Binary Permissions
        run: |
          # Make sure the binary is executable
          chmod +x ESP.dylib
          
          # Remove existing extended attributes that break signatures
          xattr -c ESP.dylib
          
          # Rename for standard injection
          cp ESP.dylib libESP.dylib

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: Clean-ESP-Binary
          path: libESP.dylib
